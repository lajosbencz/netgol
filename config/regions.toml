# Region table. Each entry is a rectangular area of the world with independent
# flags. The (optional) `pattern` text initialises the region's live cells and
# also defines its width/height; `#` = alive, `.` = dead/skip, ` ` = skip.
#
# Flags:
#   frozen - cells inside don't evolve under GoL (sim-side enforcement)
#   locked - cells inside cannot be toggled by client Edit messages (hub-side)
#   owned  - `owner` user-id is meaningful (forward-compat; no semantics in v1)

[[regions]]
name = "lazos-me"
origin = [-38, -11]
flags = ["frozen", "locked"]
pattern = """
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
........#......###..#####..###...####.......#...#.#####........
........#.....#...#.....#.#...#.#...........##.##.#............
........#.....#...#....#..#...#.#...........#.#.#.#............
........#.....#####...#...#...#..###........#.#.#.####.........
........#.....#...#..#....#...#.....#.......#...#.#............
........#.....#...#.#.....#...#.....#.......#...#.#............
........#####.#...#.#####..###..####....#...#...#.#####........
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
...............................................................
"""
