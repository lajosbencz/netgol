bind = "0.0.0.0:8080"
metrics_bind = "0.0.0.0:9090"
tick_hz = 10
max_live_chunks = 100_000
peer_outbound_capacity = 4096
snapshot_path = "data/world.snap"
snapshot_interval_ticks = 600
regions_path = "config/regions.toml"

base_url       = "http://localhost:8080"
jwt_secret     = "change-me-in-production"
claim_w_chunks = 3
claim_h_chunks = 2
users_dir      = "data/users"
claims_dir     = "data/claims"

# OIDC provider (auto-discovered via issuer_url):
# [oidc_providers.google]
# display_name = "Google"
# issuer_url   = "https://accounts.google.com"
# client_id and client_secret injected via env:
#   NETGOL_OIDC_PROVIDERS__GOOGLE__CLIENT_ID
#   NETGOL_OIDC_PROVIDERS__GOOGLE__CLIENT_SECRET

# OAuth2-only provider (explicit endpoints, e.g. GitHub):
# [oidc_providers.github]
# display_name  = "GitHub"
# auth_url      = "https://github.com/login/oauth/authorize"
# token_url     = "https://github.com/login/oauth/access_token"
# userinfo_url  = "https://api.github.com/user"
# client_id and client_secret injected via env:
#   NETGOL_OIDC_PROVIDERS__GITHUB__CLIENT_ID
#   NETGOL_OIDC_PROVIDERS__GITHUB__CLIENT_SECRET
