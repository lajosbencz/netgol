<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lazos.me</title>
    <style>
      :root {
        --bg: #0a1120;
        --alive: #8895ad;
        --frozen-alive: #4979c2;
        --frozen-dead: #0e182c;
        --owned-alive: #4477c8;
        --owned-dead: #0d1828;
        --hud: #6e7787;
        --panel-bg: rgba(24, 33, 53, 0.8);
        --panel-fg: #b8bdc7;
        --panel-border: rgba(255, 255, 255, 0.08);
        --panel-divider: rgba(255, 255, 255, 0.08);
        --accent: #4a7fb8;
        --status-ok: #5fc97a;
        --status-warn: #d9a13b;
        --status-err: #c95f5f;
        --status-info: #5fc9c9;
        --status-stamp: #c95fa8;
      }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--panel-fg); font: 12px ui-monospace, monospace; overflow: hidden; }
      #canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; image-rendering: pixelated; }

      .panel {
        position: fixed;
        background: var(--panel-bg);
        color: var(--panel-fg);
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 6px 10px;
        user-select: none;
        min-width: 130px;
        max-height: calc(100vh - 16px);
        overflow-y: auto;
      }
      .panel > header {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 11px;
        color: var(--hud);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .panel.collapsed > .body { display: none; }
      .panel > .body { margin-top: 6px; line-height: 1.5; }

      #stats { top: 8px; left: 8px; }
      #stamps { top: 8px; right: 8px; }
      #controls { bottom: 8px; right: 8px; max-width: 280px; }

      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--hud);
      }
      .dot.green { background: var(--status-ok); }
      .dot.orange { background: var(--status-warn); }
      .dot.red { background: var(--status-err); }

      svg.icon { width: 14px; height: 14px; flex: none; color: var(--hud); }
      #controls > header svg.icon { color: var(--status-info); }
      #stamps > header svg.icon { color: var(--status-stamp); }

      #stats .body span.value { color: var(--panel-fg); }
      #stats .body div { white-space: pre; }

      #stamps h4 {
        margin: 6px 0 2px 0;
        font-size: 10px;
        color: var(--hud);
        font-weight: normal;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      #stamps h4:first-child { margin-top: 0; }
      #stamps button {
        display: block;
        width: 100%;
        text-align: left;
        background: transparent;
        color: var(--panel-fg);
        border: 1px solid transparent;
        padding: 3px 6px;
        margin: 1px 0;
        font: inherit;
        cursor: pointer;
        border-radius: 2px;
      }
      #stamps button:hover { background: rgba(255, 255, 255, 0.06); }
      #stamps button.active { background: var(--accent); color: white; }

      #controls .body { color: var(--hud); font-size: 11px; }
      #controls h4 { margin: 8px 0 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--panel-fg); }
      #controls h4:first-child { margin-top: 0; }
      #controls table { border-collapse: collapse; width: 100%; }
      #controls td { padding: 1px 0; line-height: 1.7; }
      #controls td:first-child { color: var(--panel-fg); padding-right: 10px; white-space: nowrap; }
      .v-pixels { margin-left: auto; font-size: 10px; color: var(--hud); letter-spacing: 0.03em; }

      #fab {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        padding: 6px;
        min-width: 0;
      }
      #fab button {
        background: transparent;
        color: var(--panel-fg);
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 8px 16px;
        font: inherit;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
      }
      #fab button:active { background: rgba(255, 255, 255, 0.08); }

      #links {
        position: fixed;
        bottom: 8px;
        left: 8px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
      .link-item {
        min-width: 0;
        padding: 6px 10px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        color: var(--hud);
        text-decoration: none;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .link-item:hover { color: var(--panel-fg); }
      .link-item svg.icon { width: 14px; height: 14px; color: inherit; }

      /* Auth panel — bottom centre */
      #auth {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        z-index: 10;
      }
      .leave-mark-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 10px 22px;
        font: inherit;
        font-size: 13px;
        letter-spacing: 0.04em;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        transition: opacity 0.15s;
      }
      .leave-mark-btn:hover { opacity: 0.85; }
      .auth-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 6px 10px;
      }
      .auth-name { color: var(--panel-fg); font-size: 12px; }
      .icon-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: transparent;
        color: var(--panel-fg);
        border: 1px solid var(--panel-border);
        border-radius: 3px;
        padding: 4px 8px;
        font: inherit;
        font-size: 11px;
        cursor: pointer;
      }
      .icon-btn:hover { background: rgba(255,255,255,0.06); }
      .icon-btn svg.icon { width: 13px; height: 13px; }

      /* Auth modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal-box {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        padding: 20px 24px;
        min-width: 220px;
        max-width: 320px;
        backdrop-filter: blur(8px);
      }
      .modal-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        color: var(--panel-fg);
        margin-bottom: 16px;
      }
      .modal-close {
        padding: 2px 4px;
        margin-left: 8px;
        border: none;
      }
      .provider-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 14px;
        margin: 4px 0;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        color: var(--panel-fg);
        text-decoration: none;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.1s;
      }
      .provider-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
      .provider-btn svg.icon { width: 16px; height: 16px; }
      .modal-empty { color: var(--hud); font-size: 12px; margin: 0; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="stats" class="panel collapsed"></div>
    <div id="stamps" class="panel collapsed"></div>
    <div id="controls" class="panel collapsed"></div>
    <div id="links"></div>
    <div id="auth"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
